name: ai_wrozka
description: AI Wróżka - Analiza Dłoni z wykorzystaniem AI

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Fonts
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  lottie: ^3.3.1
  
  # Camera & Image
  camera: ^0.10.6
  image_picker: ^1.1.2
  
  # HTTP & API
  http: ^1.4.0
  
  # File & Storage
  path_provider: ^2.1.5
  
  # Sharing
  share_plus: ^7.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.3

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/animations/
    - assets/sounds/
    - assets/data/